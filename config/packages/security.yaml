# config/packages/security.yaml
#
# Drop this into your existing security.yaml.
# Adjust the provider / user_class to match your setup.

security:
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 12

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            custom_authenticators:
                - App\Security\AppAuthenticator

            form_login:
                login_path: app_login          # GET  /login
                check_path: app_login          # POST /login  (same route, Symfony intercepts POST)
                username_parameter: _username  # matches name="_username" in the template
                password_parameter: _password  # matches name="_password" in the template
                csrf_parameter:     _csrf_token
                csrf_token_id:      authenticate
                default_target_path: /         # redirect after successful login
                always_use_default_target_path: false

            remember_me:
                secret:   '%kernel.secret%'
                lifetime: 2592000              # 30 days in seconds
                path:     /
                secure:   auto
                httponly: true
                samesite: lax
                remember_me_parameter: _remember_me   # matches name="_remember_me" in template

            logout:
                path: app_logout
                target: app_login

            # Brute-force protection (replaces the manual session counter)
            login_throttling:
                max_attempts: 5       # per IP + username
                interval:     '15 minutes'
            entry_point: App\Security\AppAuthenticator
    access_control:
        - { path: ^/login,    roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/,         roles: ROLE_USER }
