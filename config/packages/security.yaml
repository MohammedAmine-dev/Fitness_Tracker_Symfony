security:
    # ── Password hashing ──────────────────────────────────────────────────────
    # Use bcrypt for our User entity (Symfony 7 style)
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 13

    # ── User providers ────────────────────────────────────────────────────────
    # Load users from the database via the email column
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # ── Firewalls ─────────────────────────────────────────────────────────────
    firewalls:
        dev:
            # Profiler, Wdt, and static assets are always public
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            # Form-based login authenticator
            form_login:
                login_path: app_login          # Route that shows the login form (GET)
                check_path: app_login          # Route that processes credentials (POST)
                default_target_path: app_dashboard
                enable_csrf: true              # Protect against CSRF attacks

            # Logout configuration
            logout:
                path: app_logout               # Route intercepted by the firewall
                target: app_login              # Redirect here after logout

            # Remember-me can be enabled here when needed
            # remember_me:
            #     secret: '%kernel.secret%'
            #     lifetime: 604800 # 1 week in seconds

    # ── Access control ────────────────────────────────────────────────────────
    # Rules are evaluated top-to-bottom; first match wins
    access_control:
        - { path: ^/login,    roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/,         roles: ROLE_USER }

# ── Test environment overrides ────────────────────────────────────────────────
when@test:
    security:
        password_hashers:
            # Use cheaper hashing in tests to keep the suite fast
            App\Entity\User:
                algorithm: bcrypt
                cost: 4   # Lowest possible value for bcrypt
